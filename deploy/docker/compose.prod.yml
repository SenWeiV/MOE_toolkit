services:
  moe-api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        INSTALL_DOCKER_CLI: "0"
    restart: unless-stopped
    environment:
      MOE_ENV: beta
      MOE_API_HOST: 0.0.0.0
      MOE_API_PORT: 8080
      MOE_PUBLIC_BASE_URL: ${MOE_PUBLIC_BASE_URL}
      MOE_API_KEYS_RAW: ${MOE_API_KEYS_RAW:?set-in-env}
      MOE_API_KEY_STORE_PATH: ${MOE_API_KEY_STORE_PATH:-/srv/moe/admin/api_keys.json}
      MOE_ADMIN_USERNAME: ${MOE_ADMIN_USERNAME:-}
      MOE_ADMIN_PASSWORD: ${MOE_ADMIN_PASSWORD:-}
      MOE_ADMIN_SESSION_SECRET: ${MOE_ADMIN_SESSION_SECRET:-}
      MOE_STORAGE_ROOT: /srv/moe
      MOE_DOCKER_HOST_STORAGE_ROOT: /opt/moe-toolkit/data
      MOE_EXECUTION_BACKEND: docker
      MOE_EMBEDDED_WORKER_ENABLED: "false"
      MOE_QUEUE_CLAIM_TIMEOUT_SECONDS: 300
    ports:
      - "8080:8080"
    volumes:
      - /opt/moe-toolkit/data:/srv/moe

  moe-worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        INSTALL_DOCKER_CLI: "1"
    command: ["python", "-m", "moe_toolkit.cloud.worker_main"]
    restart: unless-stopped
    environment:
      MOE_DOCKER_BINARY: /usr/bin/docker
      MOE_ENV: beta
      MOE_EXECUTION_BACKEND: docker
      MOE_STORAGE_ROOT: /srv/moe
      MOE_DOCKER_HOST_STORAGE_ROOT: /opt/moe-toolkit/data
      MOE_EMBEDDED_WORKER_ENABLED: "false"
      MOE_QUEUE_CLAIM_TIMEOUT_SECONDS: 300
    volumes:
      - /opt/moe-toolkit/data:/srv/moe
      - /usr/bin/docker:/usr/bin/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock

  cleanup-job:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        INSTALL_DOCKER_CLI: "0"
    command: ["python", "-m", "moe_toolkit.cloud.cleanup_main"]
    restart: unless-stopped
    environment:
      MOE_ENV: beta
      MOE_EXECUTION_BACKEND: inline
      MOE_STORAGE_ROOT: /srv/moe
    volumes:
      - /opt/moe-toolkit/data:/srv/moe
